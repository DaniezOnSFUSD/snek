<!DOCTYPE html>
<html>
<head>
    <title>Burple Plains - DaniezOnSFUSD</title>
    <style>
        :root { --blurple: #5865F2; --dark-bg: #0d1117; --panel: #161b22; }
        body {
            background-color: var(--dark-bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; color: #c9d1d9;
        }
        #game-container {
            position: relative; border-radius: 24px; overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.6); border: 2px solid #30363d;
        }
        canvas { display: block; background: #000; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.96); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        
        .tracker-box {
            background: var(--panel); border: 1px solid #30363d; border-radius: 16px;
            padding: 20px; margin: 15px 0; width: 85%; position: relative;
        }
        .holiday-pill {
            display: inline-block; padding: 6px 14px; margin: 4px; border-radius: 20px;
            font-size: 12px; background: #21262d; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent; color: #8b949e;
        }
        .holiday-pill:hover { border-color: var(--blurple); color: white; transform: scale(1.05); }

        /* ANIMATED PREVIEW WINDOW */
        #preview-window {
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            width: 160px; height: 110px; border-radius: 14px; border: 3px solid var(--blurple);
            background: #000; overflow: hidden; display: none; pointer-events: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); z-index: 20;
        }
        #preview-canvas { width: 100%; height: 100%; }

        button {
            background: #238636; color: white; border: none; padding: 16px 50px;
            font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold;
            transition: 0.2s; box-shadow: 0 4px 0 #1a6328;
        }
        button:hover { background: #2ea043; transform: translateY(-2px); }
        .hidden { display: none !important; }
        #hud {
            position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around;
            color: #fff; font-weight: 900; z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="hud" class="hidden">
            <div>🍎 SCORE: <span id="score">0</span></div>
            <div>🏆 BEST: <span id="highScore">0</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="color:var(--blurple); margin:0; font-size: 38px;">Burple Plains Snek</h1>
            <div style="font-size: 13px; opacity: 0.5;">by DaniezOnSFUSD</div>

            <div class="tracker-box">
                <div id="preview-window">
                    <canvas id="preview-canvas" width="160" height="110"></canvas>
                </div>
                <div style="font-size: 10px; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; color: var(--blurple); font-weight: bold;">Live Season Previews</div>
                <div id="tracker-list"></div>
            </div>

            <button onclick="startGame()">START ADVENTURE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const preCanvas = document.getElementById("preview-canvas");
        const preCtx = preCanvas.getContext("2d");

        let score = 0, dx = 0, dy = 0, nextDx = 0, nextDy = 0;
        let snake = [{x: 15, y: 15}, {x: 15, y: 16}];
        let food = {x: 10, y: 10};
        let previewSnekX = 20, previewDir = 1, previewFrame = 0;
        let activePreviewTheme = null;

        const themes = {
            winter: { bg: "#E0F7FA", accent: "#B2EBF2", name: "Winter" },
            spring: { bg: "#FFD1DC", accent: "#FFB6C1", name: "Spring" },
            summer: { bg: "#A2E4B8", accent: "#81C784", name: "Summer" },
            autumn: { bg: "#FFB347", accent: "#F57C00", name: "Autumn" },
            birthday: { bg: "#FFF9C4", accent: "#FDD835", name: "Party" }
        };

        const holidays = [
            { name: "New Year 🎆", t: 'winter' },
            { name: "DaniezOnSFUSD's Birthday! 🎂", t: 'birthday' },
            { name: "St. Patricks 🍀", t: 'spring' },
            { name: "Halloween 🎃", t: 'autumn' },
            { name: "Christmas 🎄", t: 'winter' }
        ];

        function initTracker() {
            const list = document.getElementById('tracker-list');
            const preview = document.getElementById('preview-window');
            
            holidays.forEach(h => {
                const pill = document.createElement('div');
                pill.className = 'holiday-pill';
                pill.innerText = h.name;
                
                pill.onmouseenter = () => {
                    preview.style.display = 'block';
                    activePreviewTheme = themes[h.t];
                    runPreviewLoop();
                };
                pill.onmouseleave = () => {
                    preview.style.display = 'none';
                    activePreviewTheme = null;
                };
                list.appendChild(pill);
            });
        }

        function runPreviewLoop() {
            if (!activePreviewTheme) return;
            previewFrame++;
            
            // Draw Background
            preCtx.fillStyle = activePreviewTheme.bg;
            preCtx.fillRect(0,0,160,110);

            // Draw Decorative "Grass" or "Snow"
            preCtx.fillStyle = activePreviewTheme.accent;
            for(let i=0; i<5; i++) {
                preCtx.fillRect(10 + (i*30), 80, 15, 5);
            }

            // Move Mini-Snek
            previewSnekX += previewDir * 1.5;
            if (previewSnekX > 110 || previewSnekX < 10) previewDir *= -1;

            // Draw Mini-Snek
            for(let i=0; i<4; i++) {
                preCtx.fillStyle = (i === 0) ? "#5865F2" : "#7289da";
                const segmentX = previewSnekX - (i * 8 * previewDir);
                const segmentY = 50 + Math.sin((previewFrame + i * 5) * 0.1) * 3;
                preCtx.beginPath();
                preCtx.roundRect(segmentX, segmentY, 10, 10, 3);
                preCtx.fill();
                
                if(i === 0) { // Eye
                    preCtx.fillStyle = "white";
                    const eyePos = previewDir === 1 ? segmentX + 7 : segmentX + 1;
                    preCtx.beginPath(); preCtx.arc(eyePos, segmentY + 3, 1.5, 0, Math.PI*2); preCtx.fill();
                }
            }
            requestAnimationFrame(runPreviewLoop);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            nextDx = 0; nextDy = -1;
            gameLoop();
        }

        function update() {
            dx = nextDx; dy = nextDy; if(dx===0 && dy===0) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if(head.x<0 || head.x>=30 || head.y<0 || head.y>=30 || snake.some(s=>s.x===head.x && s.y===head.y)) {
                location.reload(); return;
            }
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score++; document.getElementById('score').innerText = score;
                food = {x: Math.floor(Math.random()*30), y: Math.floor(Math.random()*30)};
            } else { snake.pop(); }
        }

        function gameLoop() {
            ctx.fillStyle = "#A2E4B8"; ctx.fillRect(0,0,600,600);
            ctx.font = "20px Arial"; ctx.fillText("🍎", food.x*20+2, food.y*20+18);
            snake.forEach(p => {
                ctx.fillStyle = "#5865F2";
                ctx.beginPath(); ctx.roundRect(p.x*20, p.y*20, 19, 19, 5); ctx.fill();
            });
            update();
            setTimeout(gameLoop, 100);
        }

        window.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            if((k==="w"||k==="arrowup") && dy!==1) {nextDx=0; nextDy=-1;}
            if((k==="s"||k==="arrowdown") && dy!==-1) {nextDx=0; nextDy=1;}
            if((k==="a"||k==="arrowleft") && dx!==1) {nextDx=-1; nextDy=0;}
            if((k==="d"||k==="arrowright") && dx!==-1) {nextDx=1; nextDy=0;}
        });

        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,600,600);
        initTracker();
    </script>
</body>
</html>
