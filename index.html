<!DOCTYPE html>
<html>
<head>
    <title>Blurple Plains Snek - DaniezOnSFUSD</title>
    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 4px solid #5865F2;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
            background-color: #1a1a1a;
        }
        .stats {
            margin-bottom: 10px;
            font-size: 24px;
            color: #5865F2;
            font-weight: bold;
        }
        .controls {
            margin-top: 15px;
            color: #8e9297;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="stats">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div class="controls">Use Arrow Keys or WASD to Move</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15, type: 'apple'};
        let particles = [];

        const colors = {
            blurple: '#5865F2',
            black: '#1a1a1a',
            grass: '#2e4d2e',
            apple: '#ff4d4d',
            grape: '#9b59b6',
            mango: '#ffb900'
        };

        function main() {
            if (didGameEnd()) {
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", canvas.width/4, canvas.height/2);
                ctx.font = "20px Arial";
                ctx.fillText("Press F5 to Restart", canvas.width/3, canvas.height/2 + 40);
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawGrass();
                drawFood();
                advanceSnake();
                drawSnake();
                updateParticles();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = colors.black;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawGrass() {
            ctx.fillStyle = colors.grass;
            for(let i=0; i<canvas.width; i+=gridSize*2) {
                for(let j=0; j<canvas.height; j+=gridSize*2) {
                    if((i+j) % 3 == 0) ctx.fillRect(i, j, 2, 2);
                }
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = colors.blurple;
                ctx.strokeStyle = '#1a1a1a';
                // Head has eyes
                if (index === 0) {
                    ctx.beginPath();
                    ctx.roundRect(part.x * gridSize, part.y * gridSize, gridSize-2, gridSize-2, 5);
                    ctx.fill();
                    // Eyes
                    ctx.fillStyle = "white";
                    ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, 3, 3);
                    ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 4, 3, 3);
                } else {
                    ctx.beginPath();
                    ctx.roundRect(part.x * gridSize, part.y * gridSize, gridSize-2, gridSize-2, 3);
                    ctx.fill();
                }
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                createParticles(food.x * gridSize, food.y * gridSize, colors[food.type]);
                if (food.type === 'apple') score += 1;
                if (food.type === 'grape') { score += 3; snake.push({...snake[snake.length-1]}); }
                if (food.type === 'mango') score += 5;
                
                scoreElement.innerHTML = score;
                createFood();
            } else {
                if(dx !== 0 || dy !== 0) snake.pop();
            }
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            const rand = Math.random();
            if (rand < 0.7) food.type = 'apple';
            else if (rand < 0.9) food.type = 'grape';
            else food.type = 'mango';
        }

        function drawFood() {
            ctx.fillStyle = colors[food.type];
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            // Tiny stem
            ctx.fillStyle = "#4a2c2a";
            ctx.fillRect(food.x * gridSize + gridSize/2 - 1, food.y * gridSize + 2, 2, 4);
        }

        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x + gridSize/2,
                    y: y + gridSize/2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 20,
                    color: color
                });
            }
        }

        function updateParticles() {
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.fillRect(p.x, p.y, 3, 3);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        window.addEventListener("keydown", e => {
            const LEFT_KEY = 37, UP_KEY = 38, RIGHT_KEY = 39, DOWN_KEY = 40;
            const W = 87, A = 65, S = 83, D = 68;

            const keyPressed = e.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT_KEY || keyPressed === A) && !goingRight) { dx = -1; dy = 0; }
            if ((keyPressed === UP_KEY || keyPressed === W) && !goingDown) { dx = 0; dy = -1; }
            if ((keyPressed === RIGHT_KEY || keyPressed === D) && !goingLeft) { dx = 1; dy = 0; }
            if ((keyPressed === DOWN_KEY || keyPressed === S) && !goingUp) { dx = 0; dy = 1; }
        });

        createFood();
        main();
    </script>
</body>
</html>
