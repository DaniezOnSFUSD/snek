<!DOCTYPE html>
<html>
<head>
    <title>Burple Plains - DaniezOnSFUSD</title>
    <style>
        :root { --blurple: #5865F2; --dark-bg: #0d1117; }
        body {
            background-color: var(--dark-bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; color: #c9d1d9;
        }
        #game-container {
            position: relative; border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 4px solid #30363d;
            transition: all 0.4s ease;
        }
        canvas { display: block; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.94); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; text-align: center;
        }
        h1 { color: var(--blurple); font-size: 32px; margin: 0; }
        
        /* Season Tracker Styling */
        .tracker-box {
            background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 15px; margin: 15px 0; width: 85%;
        }
        .tracker-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; opacity: 0.6; }
        .holiday-pill {
            display: inline-block; padding: 6px 12px; margin: 4px; border-radius: 20px;
            font-size: 12px; background: #21262d; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent; color: #8b949e;
        }
        .holiday-pill:hover { border-color: var(--blurple); background: #30363d; color: white; transform: scale(1.05); }
        .is-active { background: var(--blurple) !important; color: white !important; font-weight: bold; border-color: white; }

        button {
            background: #238636; color: white; border: none; padding: 14px 45px;
            font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #2ea043; transform: translateY(-2px); }
        .hidden { display: none !important; }
        #hud {
            position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around;
            color: #f0f6fc; font-weight: bold; z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div id="hud" class="hidden">
            <div>🍎 SCORE: <span id="score">0</span></div>
            <div>🏆 BEST: <span id="highScore">0</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>Burple Plains Snek</h1>
            <div style="font-size: 13px; opacity: 0.6; margin-top: 5px;">by DaniezOnSFUSD</div>

            <div class="tracker-box">
                <div class="tracker-title">Season & Holiday Tracker</div>
                <div id="tracker-list">
                    <!-- Holidays injected by JS -->
                </div>
            </div>

            <button onclick="startGame()">PLAY ADVENTURE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const now = new Date();
        const curM = now.getMonth();
        const curD = now.getDate();

        let score = 0, highScore = localStorage.getItem('snekHighScore') || 0;
        let dx = 0, dy = 0, nextDx = 0, nextDy = 0;
        let snake = [{x: 15, y: 15}, {x: 15, y: 16}];
        let food = {x: 10, y: 10};

        const seasons = {
            winter: { bg: "#E0F7FA", accent: "#00BCD4", name: "Winter" },
            spring: { bg: "#FFD1DC", accent: "#FF91A4", name: "Spring" },
            summer: { bg: "#A2E4B8", accent: "#4AB40D", name: "Summer" },
            autumn: { bg: "#FFB347", accent: "#E67E22", name: "Autumn" }
        };

        const holidays = [
            { name: "New Year 🎆", m: 0, d: 1, s: 'winter' },
            { name: "DaniezOnSFUSD's Birthday! 🎂", m: 1, d: 22, s: 'winter' },
            { name: "St. Patricks 🍀", m: 2, d: 17, s: 'spring' },
            { name: "Easter 🐰", m: 3, d: 15, s: 'spring' },
            { name: "Halloween 🎃", m: 9, d: 31, s: 'autumn' },
            { name: "Christmas 🎄", m: 11, d: 25, s: 'winter' }
        ];

        let activeTheme = seasons.summer;

        function initTracker() {
            const list = document.getElementById('tracker-list');
            holidays.forEach(h => {
                const pill = document.createElement('div');
                pill.className = 'holiday-pill';
                if(h.m === curM && h.d === curD) pill.classList.add('is-active');
                pill.innerText = h.name;
                
                pill.onmouseover = () => { activeTheme = seasons[h.s]; drawWorld(); };
                pill.onmouseout = () => { setSystemSeason(); drawWorld(); };
                
                list.appendChild(pill);
            });
            setSystemSeason();
            drawWorld();
        }

        function setSystemSeason() {
            if (curM >= 2 && curM <= 4) activeTheme = seasons.spring;
            else if (curM >= 5 && curM <= 7) activeTheme = seasons.summer;
            else if (curM >= 8 && curM <= 10) activeTheme = seasons.autumn;
            else activeTheme = seasons.winter;
        }

        function drawWorld() {
            ctx.fillStyle = activeTheme.bg;
            ctx.fillRect(0,0,600,600);
            // Grid lines
            ctx.strokeStyle = activeTheme.accent;
            ctx.globalAlpha = 0.15;
            for(let i=0; i<600; i+=20) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(600,i); ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
        }

        function drawSnake() {
            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? "#5865F2" : "#7289da";
                ctx.beginPath(); ctx.roundRect(p.x*20, p.y*20, 19, 19, 6); ctx.fill();
                if(i === 0) {
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(p.x*20+6, p.y*20+7, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(p.x*20+13, p.y*20+7, 2, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function update() {
            dx = nextDx; dy = nextDy;
            if(dx === 0 && dy === 0) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if(head.x<0 || head.x>=30 || head.y<0 || head.y>=30 || snake.some(s=>s.x===head.x && s.y===head.y)) {
                location.reload(); return;
            }
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score++; document.getElementById('score').innerText = score;
                food = {x: Math.floor(Math.random()*30), y: Math.floor(Math.random()*30)};
            } else { snake.pop(); }
        }

        function gameLoop() {
            drawWorld();
            ctx.font = "20px Arial"; ctx.fillText("🍎", food.x*20+2, food.y*20+18);
            drawSnake();
            update();
            setTimeout(gameLoop, 100);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('highScore').innerText = highScore;
            nextDx = 0; nextDy = -1;
            gameLoop();
        }

        window.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            if((k==="w"||k==="arrowup") && dy!==1) {nextDx=0; nextDy=-1;}
            if((k==="s"||k==="arrowdown") && dy!==-1) {nextDx=0; nextDy=1;}
            if((k==="a"||k==="arrowleft") && dx!==1) {nextDx=-1; nextDy=0;}
            if((k==="d"||k==="arrowright") && dx!==-1) {nextDx=1; nextDy=0;}
        });

        initTracker();
    </script>
</body>
</html>
