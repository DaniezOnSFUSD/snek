<!DOCTYPE html>
<html>
<head>
    <title>Burple Plains Snek by DaniezOnSFUSD</title>
    <style>
        :root {
            --blurple: #5865F2;
            --grass: #7CFC00; /* Playful Lawn Green */
            --dark-grass: #4AB40D;
            --black: #23272a; /* Softer Discord Black */
        }
        body {
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Rounded, sans-serif;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        canvas {
            background-color: var(--grass);
            display: block;
        }
        /* UI Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }
        h1 { color: var(--blurple); margin: 0; font-size: 42px; text-shadow: 2px 2px 0px #fff; }
        .credit { color: var(--dark-grass); font-weight: bold; margin-bottom: 30px; }
        
        button {
            background: var(--blurple);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
        }
        button:hover { transform: scale(1.1); background: #4752c4; }
        button.secondary { background: #b9bbbe; }

        .hidden { display: none !important; }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <!-- HUD -->
        <div id="hud" class="hidden">Score: <span id="score">0</span></div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>Burple Plains Snek</h1>
            <div class="credit">by DaniezOnSFUSD</div>
            <button onclick="startGame()">PLAY</button>
            <button class="secondary" onclick="toggleSettings()">SETTINGS</button>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen" class="overlay hidden">
            <h1>Settings</h1>
            <p style="color: #4f545c">Game Speed: <input type="range" id="speedRange" min="50" max="200" value="100"></p>
            <button onclick="toggleSettings()">BACK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        
        let score = 0;
        let dx = 0, dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15, type: 'apple'};
        let gameActive = false;
        let gameLoop;

        function clearCanvas() {
            // Draw playful checkerboard grass
            for(let i=0; i<30; i++) {
                for(let j=0; j<30; j++) {
                    ctx.fillStyle = (i+j) % 2 === 0 ? '#7CFC00' : '#73eb00';
                    ctx.fillRect(i*20, j*20, 20, 20);
                }
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#5865F2' : '#7289da'; // Blurple head
                ctx.beginPath();
                ctx.roundRect(part.x * 20, part.y * 20, 18, 18, 5);
                ctx.fill();
                if(index === 0) { // Eyes
                    ctx.fillStyle = "white";
                    ctx.fillRect(part.x * 20 + 4, part.y * 20 + 4, 3, 3);
                    ctx.fillRect(part.x * 20 + 11, part.y * 20 + 4, 3, 3);
                }
            });
        }

        function advanceSnake() {
            if (dx === 0 && dy === 0) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.innerText = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * 30),
                y: Math.floor(Math.random() * 30),
                type: ['apple', 'grape', 'mango'][Math.floor(Math.random()*3) ]
            };
        }

        function drawFood() {
            const colors = { apple: '#ff4d4d', grape: '#9b59b6', mango: '#ffb900' };
            ctx.fillStyle = colors[food.type];
            ctx.beginPath();
            ctx.arc(food.x * 20 + 10, food.y * 20 + 10, 8, 0, Math.PI*2);
            ctx.fill();
        }

        function checkGameOver() {
            const head = snake[0];
            if (head.x < 0 || head.x >= 30 || head.y < 0 || head.y >= 30) return true;
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function gameStep() {
            if (checkGameOver()) {
                alert("Game Over! Score: " + score);
                location.reload();
                return;
            }
            clearCanvas();
            drawFood();
            advanceSnake();
            drawSnake();
            setTimeout(gameStep, 1000 / (document.getElementById('speedRange').value / 10));
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            gameActive = true;
            gameStep();
        }

        function toggleSettings() {
            document.getElementById('settings-screen').classList.toggle('hidden');
            document.getElementById('start-screen').classList.toggle('hidden');
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" || e.key === "w") { if(dy !== 1) {dx = 0; dy = -1;} }
            if (e.key === "ArrowDown" || e.key === "s") { if(dy !== -1) {dx = 0; dy = 1;} }
            if (e.key === "ArrowLeft" || e.key === "a") { if(dx !== 1) {dx = -1; dy = 0;} }
            if (e.key === "ArrowRight" || e.key === "d") { if(dx !== -1) {dx = 1; dy = 0;} }
        });

        clearCanvas(); // Initial draw
    </script>
</body>
</html>
