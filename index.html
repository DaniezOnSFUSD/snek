<!DOCTYPE html>
<html>
<head>
    <title>Burple Plains - DaniezonMC</title>
    <style>
        :root { --blurple: #5865F2; --dark-bg: #0d1117; --panel: #161b22; --gold: #FFD700; }
        body {
            background-color: var(--dark-bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; color: #c9d1d9;
        }
        #game-container {
            position: relative; border-radius: 24px; overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.6); border: 2px solid #30363d;
            background: #000;
        }
        canvas { display: block; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.96); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; text-align: center;
        }
        
        .tracker-box {
            background: var(--panel); border: 1px solid #30363d; border-radius: 16px;
            padding: 20px; margin: 15px 0; width: 85%; position: relative;
        }
        .holiday-pill {
            display: inline-block; padding: 6px 14px; margin: 4px; border-radius: 20px;
            font-size: 12px; background: #21262d; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent; color: #8b949e;
        }
        .holiday-pill:hover { border-color: var(--blurple); color: white; transform: scale(1.05); }

        #preview-window {
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            width: 160px; height: 110px; border-radius: 14px; border: 3px solid var(--blurple);
            background: #000; overflow: hidden; display: none; pointer-events: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); z-index: 20;
        }
        
        button {
            background: #238636; color: white; border: none; padding: 16px 50px;
            font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold;
            transition: 0.2s; box-shadow: 0 4px 0 #1a6328; margin-top: 10px;
        }
        button:hover { background: #2ea043; transform: translateY(-2px); }
        button.blurple-btn { background: var(--blurple); box-shadow: 0 4px 0 #4752c4; }
        button.blurple-btn:hover { background: #4752c4; }
        
        .hidden { display: none !important; }
        #hud {
            position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around;
            color: #fff; font-weight: 900; z-index: 5; pointer-events: none; font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        /* Shake Animation for Game Over */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.4s; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="hud" class="hidden">
            <div>🍎 <span id="score">0</span></div>
            <div style="color: var(--gold);" id="gold-hud" class="hidden">⭐ <span id="gold-timer"></span></div>
            <div>🏆 <span id="highScore">0</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="color:var(--blurple); margin:0; font-size: 38px;">Burple Plains Snek</h1>
            <div style="font-size: 13px; opacity: 0.5;">by DaniezonMC</div>

            <div class="tracker-box">
                <div id="preview-window">
                    <canvas id="preview-canvas" width="160" height="110"></canvas>
                </div>
                <div style="font-size: 10px; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; color: var(--blurple); font-weight: bold;">Live Season Previews</div>
                <div id="tracker-list"></div>
            </div>

            <button onclick="startGame()">START ADVENTURE</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 style="color:#f85149; font-size: 48px; margin-bottom: 5px;">GAME OVER</h1>
            <p style="font-size: 20px; color: #8b949e;">Final Score: <span id="final-score" style="color:white; font-weight:bold;">0</span></p>
            <button class="blurple-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const preCanvas = document.getElementById("preview-canvas");
        const preCtx = preCanvas.getContext("2d");

        // Game State Variables
        let score = 0, dx = 0, dy = 0, nextDx = 0, nextDy = -1, inputProcessed = true;
        let snake = [], food = {}, goldenFood = null;
        let particles = [], gameLoopId;
        let isPlaying = false;
        let bestScore = localStorage.getItem("burpleHighScore") || 0;
        document.getElementById('highScore').innerText = bestScore;

        // Preview Variables
        let previewSnekX = 20, previewDir = 1, previewFrame = 0, activePreviewTheme = null;
        const themes = {
            winter: { bg: "#E0F7FA", accent: "#B2EBF2" },
            spring: { bg: "#FFD1DC", accent: "#FFB6C1" },
            summer: { bg: "#A2E4B8", accent: "#81C784" },
            autumn: { bg: "#FFB347", accent: "#F57C00" },
            birthday: { bg: "#FFF9C4", accent: "#FDD835" }
        };
        const holidays = [
            { name: "New Year 🎆", t: 'winter' },
            { name: "DaniezonMC's Birthday! 🎂", t: 'birthday' },
            { name: "St. Patricks 🍀", t: 'spring' },
            { name: "Halloween 🎃", t: 'autumn' },
            { name: "Christmas 🎄", t: 'winter' }
        ];

        // Particle System for explosions
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.05;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        function spawnFood() {
            food = {x: Math.floor(Math.random()*30), y: Math.floor(Math.random()*30)};
            // Ensure food doesn't spawn on snake
            while(snake.some(s => s.x === food.x && s.y === food.y)) {
                food = {x: Math.floor(Math.random()*30), y: Math.floor(Math.random()*30)};
            }
        }

        function spawnGoldenFood() {
            goldenFood = {
                x: Math.floor(Math.random()*30), 
                y: Math.floor(Math.random()*30),
                timer: 50 // Lifetime of golden apple in ticks
            };
            document.getElementById('gold-hud').classList.remove('hidden');
        }

        function createExplosion(x, y, color, count=15) {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x * 20 + 10, y * 20 + 10, color));
            }
        }

        function initTracker() {
            const list = document.getElementById('tracker-list');
            const preview = document.getElementById('preview-window');
            holidays.forEach(h => {
                const pill = document.createElement('div');
                pill.className = 'holiday-pill';
                pill.innerText = h.name;
                pill.onmouseenter = () => { preview.style.display = 'block'; activePreviewTheme = themes[h.t]; runPreviewLoop(); };
                pill.onmouseleave = () => { preview.style.display = 'none'; activePreviewTheme = null; };
                list.appendChild(pill);
            });
        }

        function runPreviewLoop() {
            if (!activePreviewTheme) return;
            previewFrame++;
            preCtx.fillStyle = activePreviewTheme.bg; preCtx.fillRect(0,0,160,110);
            preCtx.fillStyle = activePreviewTheme.accent;
            for(let i=0; i<5; i++) preCtx.fillRect(10 + (i*30), 80, 15, 5);

            previewSnekX += previewDir * 1.5;
            if (previewSnekX > 110 || previewSnekX < 10) previewDir *= -1;

            for(let i=0; i<4; i++) {
                preCtx.fillStyle = (i === 0) ? "#5865F2" : "#7289da";
                const segmentX = previewSnekX - (i * 8 * previewDir);
                const segmentY = 50 + Math.sin((previewFrame + i * 5) * 0.1) * 3;
                preCtx.beginPath(); preCtx.roundRect(segmentX, segmentY, 10, 10, 3); preCtx.fill();
            }
            requestAnimationFrame(runPreviewLoop);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            resetGame();
        }

        function resetGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('shake');
            score = 0; dx = 0; dy = 0; nextDx = 0; nextDy = -1;
            snake = [{x: 15, y: 15}, {x: 15, y: 16}, {x: 15, y: 17}];
            particles = []; goldenFood = null;
            document.getElementById('score').innerText = score;
            document.getElementById('gold-hud').classList.add('hidden');
            spawnFood();
            isPlaying = true;
            gameLoop();
        }

        function gameOver() {
            isPlaying = false;
            clearTimeout(gameLoopId);
            document.getElementById('game-container').classList.add('shake');
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem("burpleHighScore", bestScore);
                document.getElementById('highScore').innerText = bestScore;
            }
        }

        function update() {
            dx = nextDx; dy = nextDy; inputProcessed = true; 
            if(dx===0 && dy===0) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall Collision & Self Collision
            if(head.x<0 || head.x>=30 || head.y<0 || head.y>=30 || snake.some(s=>s.x===head.x && s.y===head.y)) {
                gameOver(); return;
            }
            
            snake.unshift(head);
            
            // Eat Normal Food
            if(head.x === food.x && head.y === food.y) {
                score++; document.getElementById('score').innerText = score;
                createExplosion(food.x, food.y, "#ff4444");
                spawnFood();
                // 15% chance to spawn golden food if not active
                if (!goldenFood && Math.random() < 0.15) spawnGoldenFood();
            } 
            // Eat Golden Food
            else if (goldenFood && head.x === goldenFood.x && head.y === goldenFood.y) {
                score += 5; document.getElementById('score').innerText = score;
                createExplosion(goldenFood.x, goldenFood.y, "#FFD700", 30);
                goldenFood = null;
                document.getElementById('gold-hud').classList.add('hidden');
            } 
            else { 
                snake.pop(); 
            }

            // Golden Food Timer
            if (goldenFood) {
                goldenFood.timer--;
                document.getElementById('gold-timer').innerText = goldenFood.timer;
                if (goldenFood.timer <= 0) {
                    createExplosion(goldenFood.x, goldenFood.y, "#555", 5);
                    goldenFood = null;
                    document.getElementById('gold-hud').classList.add('hidden');
                }
            }

            // Update Particles
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
        }

        function drawGrid() {
            ctx.strokeStyle = "#21262d";
            ctx.lineWidth = 1;
            for(let i=0; i<=600; i+=20) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(600, i); ctx.stroke();
            }
        }

        function gameLoop() {
            if (!isPlaying) return;

            // Background
            ctx.fillStyle = "#0d1117"; ctx.fillRect(0,0,600,600);
            drawGrid();
            
            // Draw Normal Food (Apple)
            ctx.font = "20px Arial"; ctx.fillText("🍎", food.x*20+2, food.y*20+18);

            // Draw Golden Food
            if (goldenFood) {
                // Pulse effect
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 100) * 0.4;
                ctx.fillText("⭐", goldenFood.x*20+2, goldenFood.y*20+18);
                ctx.globalAlpha = 1.0;
            }
            
            // Draw Snake
            snake.forEach((p, index) => {
                ctx.fillStyle = index === 0 ? "#7289da" : "#5865F2"; // Lighter head
                
                // Tail shrinking effect
                let size = 19;
                let offset = 0;
                if (index === snake.length - 1 && snake.length > 3) {
                    size = 10; offset = 4.5;
                } else if (index === snake.length - 2 && snake.length > 3) {
                    size = 14; offset = 2.5;
                }

                ctx.beginPath(); 
                ctx.roundRect(p.x*20 + offset, p.y*20 + offset, size, size, 5); 
                ctx.fill();

                // Eyes on head
                if (index === 0) {
                    ctx.fillStyle = "white";
                    let eye1 = {x:0, y:0}, eye2 = {x:0, y:0};
                    if (dx===1)  { eye1 = {x:14,y:5}; eye2 = {x:14,y:12}; } // Right
                    if (dx===-1) { eye1 = {x:5,y:5};  eye2 = {x:5,y:12}; }  // Left
                    if (dy===1)  { eye1 = {x:5,y:14}; eye2 = {x:12,y:14}; } // Down
                    if (dy===-1) { eye1 = {x:5,y:5};  eye2 = {x:12,y:5}; }  // Up
                    
                    if(dx!==0 || dy!==0) {
                        ctx.beginPath(); ctx.arc(p.x*20+eye1.x, p.y*20+eye1.y, 2, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(p.x*20+eye2.x, p.y*20+eye2.y, 2, 0, Math.PI*2); ctx.fill();
                    }
                }
            });

            // Draw Particles
            particles.forEach(p => p.draw(ctx));

            update();
            
            let speed = Math.max(50, 120 - (score * 2.5));
            gameLoopId = setTimeout(gameLoop, speed);
        }

        window.addEventListener("keydown", e => {
            if (!inputProcessed || !isPlaying) return; 
            const k = e.key.toLowerCase();
            if((k==="w"||k==="arrowup") && dy!==1) {nextDx=0; nextDy=-1; inputProcessed = false;}
            if((k==="s"||k==="arrowdown") && dy!==-1) {nextDx=0; nextDy=1; inputProcessed = false;}
            if((k==="a"||k==="arrowleft") && dx!==1) {nextDx=-1; nextDy=0; inputProcessed = false;}
            if((k==="d"||k==="arrowright") && dx!==-1) {nextDx=1; nextDy=0; inputProcessed = false;}
        });

        ctx.fillStyle = "#0d1117"; ctx.fillRect(0,0,600,600);
        initTracker();
    </script>
</body>
</html>
